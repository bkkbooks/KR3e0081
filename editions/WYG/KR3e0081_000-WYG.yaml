body:
  text: 瀕湖脉學醫家類提要臣等謹案瀕湖脉學一卷明李時珍撰宋人剽竊王叔和脉經改為脉訣其書之鄙謬人人知之然未能一一駁正也至元戴啟宗作刋誤字剖句析與之辨難而後其偽妄始明啟宗書之精核亦人人知之然但斥􅎓本之非尚未能詳立一法明其何以是也時珍乃撮舉其父言聞四診發明著為此書以正脉訣之失其法分浮沉遲數滑濇虚實長短洪㣲𦂳緩芤弦革牢濡弱散細伏動促結代二十七種毫釐之别精核無遺又附載宋崔嘉彦四言詩一首及諸家考証脉訣之説以互相發明與所作竒經八脉考皆附本草綱目之後可謂既能博考又能精研者矣自是以來脉訣遂廢其廓清醫學之功亦不在戴啟宗下也乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書瀕湖脉學明李時珍撰時珍曰宋有俗子杜撰脉訣鄙陋紕繆醫學習誦以為權輿逮臻頒白脉理竟昧戴同父常刋其誤先考月池翁著四診發明八卷皆精詣奥室淺學未能窺造珍因撮粹擷華僣撰此書以便習讀為脉指南世之醫病兩家咸以脉為首務不知脉乃四診之末謂之巧者爾上士欲㑹其全非備四診不可明嘉靖甲子上元日謹書于瀕湖薖所浮陽浮脉舉之有餘按之不足脉經如微風吹鳥背上毛厭厭聶聶輕汎貌如循榆莢素問如水漂木崔氏如捻蔥葉黎氏浮脉法天有輕清在上之象在卦為乾在時為秋在人為肺又謂之毛太過則中堅旁虚如循雞羽病在外也不及則氣來毛微病在中也浮脉訣言尋之如太過乃浮兼洪緊之象非脉也體状詩浮脉惟從肉上行如循榆莢似毛輕三秋得令知無恙乆病逢之卻可驚相類詩浮如木在水中浮浮大中空乃是芤拍拍而浮是洪脉來時雖盛去悠悠浮脉輕平似捻蔥虚來遲大豁然空浮而柔細方為濡散似楊花無定蹤浮而有力為洪浮而無力為芤浮而遲大為虚浮而柔細為濡虚甚為散主病詩浮脉為陽表病居遲風數熱緊寒拘浮而有力多風熱無力而浮是血虚寸浮頭痛眩生風或有風痰聚在胸闗上土衰兼木旺尺中溲便不流通浮脉主表浮散風熱有力表實浮緊風寒無力表虚浮緩風濕浮遲中風浮虚傷暑浮芤失血浮散勞極浮洪虚熱沉隂沉脉重手按至筋骨乃得脉經如綿裹砂内剛外柔楊氏如石投水必極其底沉脉法地有淵泉在下之象在卦為坎在時為冬在人為腎又謂之石亦曰營太過則如彈石按之益堅病在外也不及則氣來虚微去如數者病在中也各脉訣言緩度三闗状如爛綿者非也沉有緩數及部之沉爛綿乃弱脉非沉也體状詩水行潤下脉來沉筋骨之間耎滑勻女子寸兮男子尺四時如此號為平相類詩沉幫筋骨自調勻伏則推筋着骨尋沉細如綿真弱脉絃長實大是牢形沉行筋間牢大有力伏行骨上弱細無力主病詩沉潜水畜隂經病數熱遲寒滑有痰無力而沉虚與氣沉而有力積并寒寸沉痰鬱水停胸闗主中寒痛不通尺部濁遺并泄痢腎虚腰及下元痌沉脉主裏又主水畜有力裏實沉遲痼冷無力裏虚沉數内熱沉則為氣沉滑痰食沉濇氣鬱沉緊冷痛沉弱寒熱沉牢冷積沉緩寒濕遲隂遲脉一息三至去來極慢脉經遲為陽不勝隂故脉來不及見脉訣言重手乃得是有沉無浮一息三至甚為易而曰隠隠曰状且難是濇脉矣其謬可知體狀詩遲來一息至惟三陽不勝隂氣血寒但把浮沉分表裏消隂須益火之原相類詩脉來三至號為遲小駃于遲作緩持遲細而難知是濇浮而遲大以虚推三至為遲有有力為緩遲無力為濇止為絃甚為敗慢浮大而耎為虚緩黎氏曰遲小而實緩大而遲為隂盛陽衰為衞盛營弱宜别之主病詩遲司臟病或多痰沉痼癥瘕子細㸔有力而遲為冷痛遲而無力定虚寒寸遲必是上焦寒闗主中寒痛不堪尺是腎虚腰脚重溲便不禁疝牽丸遲脉主臟浮遲表寒有力冷痛沉遲裏寒無力虚寒數陽數脉一息六至脉經脉流薄疾素問數為隂不勝陽故脉來太過七浮沉遲數脉之綱領素問脉經皆為正脉脉訣立表八裏而遺數脉止謌于心臟其妄甚矣體状詩數脉息間常六至隂微陽盛必狂煩浮沉表裏分虚實惟有兒童作吉㸔相類詩數比平人多一至緊來如數似彈繩數而時止名為促數見闗中動脉形數而弦急為緊數而有止為促流利為滑數甚為極數見闗中為動主病詩數脉為陽熱可知只将君相火來醫實宜凉瀉虚温補肺病秋深却畏之寸數咽喉口舌瘡吐紅欬嗽肺生瘍當闗胃火并肝火尺屬滋隂降火湯數脉主腑沉數裏熱有力實火肺無力虚火肺浮數表熱氣口數實癰數虚痿滑陽中隂滑脈往來前郤流利展轉替替然如珠之應指脉經漉漉如欲脫滑為隂氣有餘故脉來流利如水脉者血之府也血盛則脉滑故腎脉宜之氣盛則脉濇故肺脉宜之不脉訣云按之即伏三闗如珠不進不退是分浮滑沉滑尺寸之滑也今正之體状相類詩滑脉如珠替替然往来流利郤還前莫将滑數為同類數脉惟㸔至數間滑則如珠數則六至主病詩滑脉為陽元氣衰痰生百病食生灾上為吐逆下畜血女脉調時定有胎寸滑膈痰生嘔吐吞酸舌强或欬嗽當闗宿食肝脾熱渇痢􅒃淋㸔尺部滑主痰飲滑短宿食浮滑風痰滑沉滑食痰臍滑數痰火經脉訣言闗胃寒尺滑似水與脉言闗滑胃熱尺滑血畜婦人經病之㫖相反其謬如此濇隂濇脉細而遲徃來難短且散或一止復來脉經參伍不調素問如輕刀刮竹脉訣如雨沾沙通真子如病蠶食葉濇為陽氣有餘氣盛則血少故脉來蹇滯而肺宜之脉訣言指下尋之似有舉之全無與脉經所云絶不相干體状詩細遲短濇徃來難散止依稀應指間如雨沾沙容易散病蠶食葉慢而艱相類詩參伍不調名曰濇輕刀刮竹短而難微似秒芒微耎甚浮沉不别有無間細遲短散時一止曰濇濡極細而耎重按若絶曰微浮而柔細曰沉而柔細曰弱主病詩濇縁血少或傷精反胃亡陽汗雨淋寒濕入營為血痺女人非孕即無經寸濇心虚痛對胸胃虚脇脹察闗中尺為精血俱傷候腸結溲淋或下紅濇主血少精傷之病女人有孕為胎病無孕為敗血杜光庭云濇脉獨見尺中形同代為死脉虚隂虚脉遲大而耎按之無力隠指豁豁然空脉經崔紫虚云形大力薄其虚可知楊脉訣言尋之不足舉之有餘止言浮脉不見虚状仁齋言状似栁絮散漫而遲滑氏言散大而耎皆是散脉非虚也體状相類詩舉之遲大按之鬆脉状無涯類谷空莫把芤虚為一例芤來浮大似慈葱虚脉浮大而遲按之無力浮芤脉浮大按之中空芤為無血虚為血虚散二脉見浮脉主病詩脈虚身熱為傷暑自汗怔忡驚悸多發熱隂虚須早治養營益氣莫蹉跎血不榮心寸口虚闗中腹脹食難舒骨蒸痿痺傷精血郤在神門兩部居經曰血虚脉虚曰氣來虚微為不及病在内日乆病脉虚者死實陽實脉浮沉皆得脉大而長微弦應指愊愊然脈經愊愊堅實貌脉脉訣言如繩應指來乃緊非實脉也體状詩浮沉皆得大而長應指無虚愊愊强熱藴三焦成壮火通腸發汗始安康相類詩實脉浮沉有力强緊如彈索轉無常須知牢脉幫筋骨實大微弦更帶長浮沉有力為實而絃急彈人為緊沉而實大微絃長為牢主病詩實脉為陽火鬱成發狂譫語吐頻頻或為陽毒或傷食大便不通或氣疼寸實應知靣熱風咽疼舌强氣塡胸當闗脾熱中宮滿尺實腰腸痛不通經曰血實脉實曰脉實者水榖為病曰氣來實强是謂太過脉訣言尺實小便不禁與脉經尺實小腹痛小便難之説何反潔古不知其謬訣為虚寒藥用薑附愈誤矣長陽長脉不大不小迢迢自若朱氏如循長竿末梢為平如引繩如循長竿為病素問長有三部之長一部之長在時為春在人為肝心脉長神强氣壮腎脉長蒂固根深經曰長則氣治皆言平脉也體状相類詩過于本位脉名長絃則非然但滿張絃脉與長争較逺良工反度自能量實牢絃緊皆兼長脉主病詩長脉迢迢大小勻反常為病似牽繩若非陽毒癲癎病即是陽明熱勢深長主有餘之病短隂短脉不及本位脉訣應指而迴不能滿部脉經戴同父云短脉只見尺寸若闗中見短上不通寸下不通尺是隂陽絶脉必死矣故闗不診短黎居士云長短未有定體諸脉舉按之時過於本位者為長不及本位者為短長脉属肝宜于春短脉属肺宜于秋但診肝肺長短自見體状相類詩兩頭縮縮名為短濇短遲遲細且難短濇而浮秋喜見三春為賊有邪干濇微動結皆兼短脉主病詩短脉惟于尺寸尋短而滑數酒傷神浮為血澀沉為痞寸主頭疼尺腹疼經曰短則氣病短主不及之病洪陽洪脉指下極大脉經來盛去衰素問來大去長通真子洪脉在卦為離在時為夏在人為心素問謂之大亦曰鉤滑氏曰來盛去衰如鉤之曲上而復下應血脉來去之象象萬物敷布下垂之状季詹炎舉言如環珠者非脉訣云季夏宜之秋季冬發汗通腸俱非洪脉所宜盖謬也體状詩脉來洪盛去還衰滿指滔滔應夏時若在春秋冬月分升陽散火莫狐疑相類詩洪脉來時拍拍然去衰來盛似波瀾欲知實脉參差處舉按絃長愊愊堅洪而有力為實實而無力為洪主病詩脉洪陽盛血應虚相火炎炎熱病居脹滿胃翻須早治隂虚洩痢可愁如寸洪心火上焦炎肺脉洪時金不堪肝火胃虚關内察腎虚隂火尺中㸔洪主陽盛隂虚之病洩痢失血乆嗽者忌之經曰形痩脉大多氣者死日脉大則病進微隂微脉極細而耎按之如欲絶若有若無脉經細而稍長戴氏血素問謂之小氣微則脉微體状相類詩微脉輕微瞥瞥乎按之欲絶有如無微為陽弱細隂弱細比于微畧較粗輕診即見重按如欲絶者微也上往来如綿而常有者細也仲景曰脉瞥瞥如羮肥者陽氣微縈縈如蠶絲細者隂氣衰長病得之死卒病得之生主病詩氣血微兮脉亦微惡寒發熱汗淋漓男為勞極諸虚候女作崩中帶下醫寸微氣促或心驚闗脉微時脹滿形尺部見之精血弱惡寒消癉痛呻吟微主乆虚血弱之病陽微惡寒隂微發熱脉訣云崩中日乆為白帶漏下多時骨肉枯緊陽緊脉來往有力左右彈人手素問如轉索無常仲景數如切繩脉經如紉箄線丹溪緊乃熱為寒束之脉故急數如此要有神氣素問謂之急脉訣言寥寥入尺來崔氏言如線皆非緊状或以浮緊為弦沉緊為牢亦近似耳體状詩舉如轉索切如繩脉象因之得緊名總是寒邪來作冦内為腹痛外身疼相類詩見絃實主病詩緊為諸痛主于寒喘欬風癎吐冷痰浮緊表寒須發越緊沉温散自然安寸緊人迎氣口分當闗心腹痛沉沉尺中有緊為隂冷定是奔豚與疝疼諸緊為寒為痛人迎緊盛傷于寒氣口緊盛傷于食尺緊痛居其腹沉乃疾在其腹中惡浮緊欬嗽沉緊皆主死緩隂緩脉去來小駛于遲脉經一息四至戴氏如絲在經不卷其軸應指和緩徃來甚勻張太素如初春楊栁舞風之象楊𤣥操如微風輕颭栁梢滑伯仁緩脉在卦為坤在時為四季在人為脾陽寸隂尺上下同等浮大而耎無有徧勝者平脉也若非其時即為有病緩而和勻不浮不沉不疾不徐不微不弱者即為胃氣故杜光庭云欲知死期何以取古賢推定五般土陽土須知不遇隂隂土遇隂當細數詳玉函經體状詩緩脈阿阿四至通栁梢裊裊颭輕風欲從脉裏求神氣只在從容和緩中相類詩見遲脉主病詩緩脉營衰衞有餘或風或濕或脾虚上為項强下痿痺分别浮沉大小區寸緩風邪項背拘闗為風眩胃家虚神門濡泄或風秘或是蹣跚足力迂浮緩為風緩濇脾虚沉緩為濕緩弱氣虚緩大風虚主緩細濕痺反脉訣言緩脾熱口臭胃齒痛夢鬼之病出自杜撰與緩無闗芤陽中隂芤脉浮大而耎按之中央空兩邉實脉經中空外實状如慈蔥芤慈葱也素問無芤名劉三㸃云芤脉何似絶類慈蔥指下成窟有邉無中戴同父云營行脉中脉以血為形芤脉中空脱血之象也訣脉經云三部脉芤長病得之生卒病得之死脉言兩頭有中間無是脉㫁截矣又言主淋瀝氣入小腸與失血之候相反誤世不小體状詩芤形浮大耎如蔥按之旁有中央空火犯陽經血上溢熱侵隂絡下流紅相類詩中空旁實乃為芤浮大而遲虚脉呼芤更帶絃名曰革血亡芤革血虚虚主病詩寸芤積血在于胸闗内逄芤腸胃癰尺部見之多下血赤淋紅痢漏崩中絃陽中隂絃脉端直以長素問如張弓絃脉經按之不移綽綽如按琴瑟絃巢氏状若筝絃脉訣從中直過挺然指下刋誤絃脉在卦為震在時為春在人為肝輕虚以滑者平實滑如循長竿者病勁急如新張弓絃者死池氏曰絃緊而數勁為太過絃緊而細為不及戴同父曰絃而耎其病輕絃而硬其病重脉訣言時時帶數又言脉緊状繩牽皆非絃象今削之體状詩絃脉迢迢端直長肝經木王􅁟應傷怒氣滿胸常欲呌翳蒙瞳子淚淋浪相類詩絃來端直似絲絃緊則如繩左右彈緊言其力絃言象牢脉絃長沉伏間又見長脉主病詩絃應東方肝膽經飲痰寒熱瘧纒身浮沉遲數須分别大小單雙有重輕寸絃頭痛膈多痰寒熱癥瘕察左闗闗右胃寒心腹痛尺中隂疝脚拘攣絃為木盛之病浮絃支飲外溢多沉絃懸飲内痛瘧脉自絃絃數多熱絃遲寒絃大主虚絃細拘急若陽絃頭痛來隂絃腹痛治單絃飲癖雙絃寒痼不食者木克土必難革隂革脉絃而芤仲景如按鼓皮丹溪仲景曰絃則為寒芤則為虚虚寒相博此名曰革男子亡血失精婦人半産漏下脉經曰三部脉革長病得之死卒病得之生時珍曰此即芤絃二脉相合故均主失血之候諸家脉書皆以為牢脉故或有革無牢有牢無革混淆不辨不知革浮牢沉革虚牢實形證皆異也又按甲乙經曰渾渾革革至如涌泉病進而危弊弊綽綽其去如絃絶者死謂脉来渾濁革變急如涌泉出而不反也王貺以為溢脉與此不同體状主病詩革脉形如按鼓皮芤絃相合脉寒虚女人半産并崩漏男子營虚或夣遺相類詩見芤牢牢隂中陽牢脉似沉似伏實大而長微絃脉經扁鵲曰牢而長者肝也仲景曰寒則牢堅有牢固之象沈氏曰似沉似伏牢之位也實大絃長牢之體也脉訣不言形状但云尋之則無按之則有云脉入皮膚辨息難又以牢為死脉皆孟浪謬誤體状相類詩絃長實大脉牢堅牢位常居沉伏間革脉芤絃自浮起革虚牢實要詳㸔主病詩寒則牢堅裏有餘腹心寒痛木乗脾疝􅒃癥瘕何愁也失血隂虚郤忌之牢主寒實之病木實則為痛扁鵲云耎為虚牢為實失血者脉冝沉細反浮大而牢者死虚病見實脉也脉訣言骨間疼痛氣居于表池氏以為腎傳于脾皆謬妄不經濡隂卽耎字濡脉極耎而浮細如帛在水中輕手相得按之無有脉經如水上浮漚帛浮水中重手按之隨手而沒之象也脉訣言按之似有舉還無是微脉非濡體状詩濡形浮細按須輕水靣浮綿力不禁病後産中猶有藥平人若見是無根相類詩浮而柔細知為濡沈細而柔作弱持微則浮微如欲絶細來沉細近于微浮細如綿曰濡極細如絶曰微沉細如綿曰弱曰浮而沉而極細不㫁細主病詩濡為亡血隂虚病髓海丹田暗已虧汗雨夜來蒸入骨血山崩倒濕侵脾寸濡陽微自汗多闗中其奈氣虚何尺傷精血虚寒甚温補真隂可起疴濡主血虚之病又為傷濕弱隂弱脉極耎而沉細按之乃得舉手無有脉經弱乃濡之沉者脉訣言輕手乃得黎氏譬如浮漚皆是濡脉非弱也素問曰脉弱以滑是有胃氣脉弱以濇是謂乆病病後老弱見之順平人少年見之逆體状詩弱來無力按之柔柔細而沉不見浮陽陷人隂精血弱白頭猶可少年愁相類詩見濡脉主病詩弱脉隂虚陽氣衰惡寒發熱骨筋萎多驚多汗精神减益氣調營急早醫寸弱陽虚病可知闗為胃弱與脾衰欲求陽陷隂虚病須把神門兩部推弱主氣虚之病仲景曰陽陷入隂故惡寒發熱又云弱主筋沉主骨陽浮隂弱血虚筋急栁氏曰氣虚則脉弱寸弱陽虚尺弱隂虚闗弱胃虚散隂散脉大而散有表無裏脉經渙漫不収崔氏無統紀無拘束至數不齊或來多去少或去多來少渙散不収如楊花散漫之象栁氏戴同父曰心脉浮大而散肺脉短濇而散平脉也心脉耎散怔忡肺脉耎散汗出肝脉耎散溢飲脾脉耎散胻腫病脉也腎脉耎散諸病脉代散死脉也難經曰散脉獨見則危栁氏曰散為氣血俱虚根本脱離之脉産婦得之生孕婦得之墮體状詩散似楊花散漫飛去來無定至難齊産為生兆胎為墮乆病逢之不必醫相類詩散脉無拘散漫然濡來浮細水中綿浮而遲大為虚脉芤脉中空有兩邉主病詩左寸怔忡右寸汗溢飲左闗應耎散右闗耎散胻腫胕散居兩尺魂應㫁細隂細脉小于微而常有細直而耎若絲線之應指脉經素問謂之小王啓言如莠蓬状其柔細也背脉訣言往来極微是微反大于細矣與經相體状詩細來纍纍細如絲應指沉沉無絶期春夏少年俱不利秋冬老弱郤相宜相類詩見微濡主病詩細脉縈縈血氣衰諸虚勞損七情乖若非濕氣侵腰腎即是傷精汗洩來寸細應知嘔吐頻入闗腹脹胃虚形尺逢定是丹田冷洩痢遺精號脱隂脉經曰細為血少氣衰有此證則順否則逆故吐衂得沉細者生憂勞過度者脉亦細伏隂伏脉重按着骨指下裁動脉經脉行筋下刋誤脉訣言尋之似有定息全無殊為舛謬體状詩伏脉推筋着骨尋指間裁動隠然深傷寒欲汗陽将解厥逆臍疼證屬隂相類詩見沉脉主病詩伏為霍亂吐頻頻腹痛多縁宿食停畜飲老痰成積聚散寒温裏莫因循食鬱胸中雙寸伏欲吐不吐常兀兀當闗腹痛困沉沉闗後疝疼還破腹傷寒一手脉伏曰單伏兩手脉伏曰雙伏不可以陽證見隂為診乃火邪内鬱不得發越陽極似隂故脉伏必有大汗而解正如乆旱将雨六合隂晦雨後庻物皆蘓之義又有夾隂傷寒先有伏隂在内外復感寒隂盛陽衰四脉厥逆六脉沉伏須投薑附及炙闗元脉乃復出也若太溪衝陽皆無脉者必死脉訣言徐徐發汗潔古以附子細辛麻黄湯主之皆非也劉元賔曰㐲脉不可發汗動陽動乃數脉見于闗上下無頭尾如豆大厥厥動揺仲景曰隂陽相搏名曰動陽動則汗出隂動則發熱形冷惡寒此三焦傷也成無巳曰隂陽相搏則虚者動故陽虚則陽動隂虚則隂動龎安常曰闗前三分為陽後三分為隂闗位半隂半陽故動隨虚見脉訣言尋之似有舉之還無不離其處不往不来三闗沉沉含糊謬妄殊非動脉詹氏言其形鼔動如鉤如毛者尤謬體状詩動脉揺揺數在闗無頭無尾豆形團其原本是隂陽搏虚者揺兮勝者安主病詩動脉專司痛與驚汗因陽動熱因隂或為洩痢拘攣病男子亡精女子崩仲景曰動則為痛為驚素問曰隂虛陽搏謂之崩又曰婦人手少隂脉動甚者妊子也促陽促脉來去數時一止復來脉經如蹶之趣徐疾不常黎氏脉經但言數而止為促脉訣乃云并居寸口不言時止者謬矣數止為促緩止為結何獨寸口哉體状詩促脉數而時一止此為陽極欲亡隂三焦鬱火炎炎盛進必無生退可生相類詩見代脉主病詩促脉惟将火病醫其因有五細推之時時喘欬皆痰積或發狂斑與毒疽促主陽盛之病一促結之因皆有氣血痰飲食五者之别有留滯則脉必見止也結隂結脉徃來緩時一止復來脉經脉訣言或來或去聚而却還與結無闗仲景有纍纍如循長竿曰隂結藹藹如車盖曰陽結脉經又有如麻子動揺旋引旋収聚散不常者曰結主死此三脉名同實異也體状詩結脉緩而時一止獨隂偏盛欲亡陽浮為氣滯沉為積汗下分明在主張相類詩見代脉主病詩結脉皆因氣血凝老痰結滯苦沉吟内生積聚外癰腫疝瘕假為殃病屬隂結主隂盛之病越人曰結甚則積甚結微則氣微浮結外有痛積伏結内有積聚代隂代脉動而中止不能自還因而復動仲景脉至還入尺良乆方來呉氏脉一息五至肺心脾肝腎五臟之氣皆足五十動而一息合大衍之數謂之平脉反此則止乃見焉腎氣不能至則四十動一止肝氣不能至則三十動一止盖一臟之氣衰而他臟之氣代至也經曰代則氣衰滑伯仁曰若無病羸痩脉代者危脉也有病而氣血乍損氣不能續者祗為病脉傷寒心悸脉代者復脉湯主之妊娠脉代者其胎百日代之生死不可不辨體状詩動而中止不能還復動因而作代㸔病者得之猶可療平人郤與夀相闗相類詩數而時止名為促緩止須将結脉呼止不能回方是代結生代死自殊塗促結之止無常數或二動三動一止即來代脉之止有常數必依數而止還入尺中良乆方來也主病詩代脉元因臟氣衰腹疼洩痢下元虧或為吐㵼中宫病女子懐胎三月兮脉經曰代散者死生洩及便膿血五十不止身無病數内有止皆知定四十一止一臟絶四年之後多亡命三十一止即三年二十一止二年應十動一止一年殂更觀氣色兼形證兩動一止三四日三四動止應六七五六一止七八朝次第推之自無失戴同父曰脉必滿五十動出自難經而脉訣五臟謌皆以四十五動為凖乖于經㫖栁東楊曰古以動數候脉是喫緊語須候五十動乃知五臟缺失今人指到腕臂即云見了夫五十動豈彈指間事耶故學者當診脉問證聼聲觀色斯備四診而無失四言舉要宋南康紫虚隠君崔嘉彦希範著明蘄州月池子李言聞子郁删補脉乃血派氣血之先血之隧道氣息應焉其象法地血之府也心之合也皮之部也資始于腎資生于胃陽中之隂本乎營衞營者隂血衞者陽氣營行脉中衞行脉外脉不自行隨氣而至氣動脉應隂陽之誼氣如槖籥血如波瀾血脉氣息上下循環十二經中皆有動脉惟手太隂寸口取决此經屬肺上系吭嗌脉之大㑹息之出入一呼一吸四至為息日夜一萬三千五百一呼一吸脉行六寸日夜八百十丈為凖初持脉時令仰其掌掌後高骨是謂闗上闗前為陽闗後為隂陽寸隂尺先後推尋心肝居左肺脾居右腎與命門居兩尺部魂魄榖神皆見寸口左主司官右主司府左大順男右大順女本缺扶命男左女右闗前一分人命之主左為人迎右為氣口神門決㫁兩在闗後人無二脉病死不愈男女脉同惟尺則異陽弱隂盛反此病至脉有七診曰浮中沉上下左右消息求尋又有九候舉按輕重三部浮沉各候五動寸候胸上闗候膈下尺候于臍下至跟踝左脉候左右脉候右病隨所在不病者否浮為心肺沉為腎肝脾胃中州浮沉之間心脉之浮浮大而散肺脉之浮浮濇而短肝脉之沉沉而絃長腎脉之沉沉實而濡脾胃屬土脉宜和緩命為相火左寸同㫁春絃夏洪秋毛冬石四季和緩是謂平脉太過實强病生于外不及虚微病生于内春得秋脉死在金日五臟准此推之不失四時百病胃氣為本脉貴有神不可不審調停自氣呼吸定息四至五至平和之則三至為遲遲則為冷六至為數數即熱證轉遲轉冷轉數轉熱遲數既明浮沉當别浮沉遲數辨内外因外因于天内因于人天有隂陽風雨晦㝠人喜怒憂思悲恐驚外因之浮則為表證沉裏遲隂數則陽盛内因之浮虚風所為沉氣遲冷數熱何疑浮數表熱沉數裏熱浮遲表虚沉遲冷結表裏隂陽風氣冷熱辨内外因脉證㕘别脉理浩繁總括于四既得提綱引申觸類浮脉法天輕手可得汎汎在上如水漂木有力洪大來盛去悠無力虚大遲而且柔虚甚則散渙漫不收有邉無中其名曰芤浮小為濡綿浮水面濡甚則微不任尋按沉脉法地近于筋骨深深在下沉極為伏有力為牢實大絃長牢甚則實愊愊而强無力為弱柔小如綿弱甚則細如蛛絲然遲脉屬隂一息三至小駃于遲緩不及四二損一敗病不可治兩息奪精脉已無氣浮大虚散或見芤革浮小濡微沉小細弱遲細為濇徃來極難易散一止止而復還結則來緩止而復來代則來緩止不能回數脉屬陽六至一息七疾八極九至為脫浮大者洪沉大牢實往來流利是謂之滑有力為緊彈如轉索數見寸口有止為促數見闗中動脉可候厥厥動揺状如小豆長則氣治過于本位長而端直絃脉應指短則氣病不能滿部不見于闗惟尺寸候一脉一形各有主病數脉相兼則見諸證浮脉主表裏必不足有力風熱無力血弱浮遲風虚浮數風熱浮緊風寒浮緩風濕浮虚傷暑浮芤失血浮洪虚火浮微勞極浮濡隂虚浮散虚劇浮絃痰食浮滑痰熱沉脉主裏主寒主積有力痰食無力氣鬱沉遲虚寒沉數熱伏沉緊冷痛沉緩水畜沉牢痼冷沉實熱極沉弱隂虚沉細痺濕沉絃飲痛沉滑宿食沉伏吐利隂毒聚積遲脉主臟陽氣伏潛有力為痛無力虚寒數脉主腑主吐主狂有力為熱無力為瘡滑脉主痰或傷于食下為畜血上為吐逆濇脉少血或中寒濕反胃結腸自汗厥逆絃脉主飲病屬膽肝絃數多熱絃遲多寒浮絃支飲沉絃懸痛陽絃頭痛隂絃腹痛緊脉主寒又主諸痛浮緊表寒沉緊裏痛長脉氣平短脉氣病細則氣少大則病進浮長風癎沉短宿食血虚脉虚氣實脉實洪脉為熱其隂則虚細脉為濕其血則虚緩大者風緩細者濕緩濇血少緩滑内熱濡小隂虚弱小陽竭陽竭惡寒隂虚發熱陽微惡寒隂微發熱男微虚損女微瀉血陽動汗出隂動發熱為痛與驚崩中失血虛寒相搏其名為革男子失精女子失血陽盛則促肺癰陽毒隂盛則結疝瘕積鬱代則氣衰或泄膿血傷寒心悸女胎三月脉之主病有宜不宜隂陽順逆凶吉可推中風浮緩急實則忌浮滑中痰沉遲中氣尸厥沉滑卒不知人入臟身冷入腑身温風傷于衞浮緩有汗寒傷于營浮緊無汗暑傷于氣脉虚身熱濕傷于血脉緩細濇傷寒熱病脉喜浮洪沉微濇小證反必凶汗後脉静身凉則安汗後脉躁熱甚必難陽病見隂病必危殆隂病見陽雖困無害上不至闗隂氣已絶下不至闗陽氣已竭代脉止歇臟絶傾危散脉無根形損難醫飲食内傷氣口急滑勞倦内傷脾脉大弱欲知是氣下手脉沉沉極則伏濇弱乆深大鬱多沉滑痰緊食氣濇血芤數火細濕滑主多痰絃主留飲熱則滑數寒則絃緊浮滑兼風沉滑兼氣食傷短疾濕留濡細瘧脉自絃絃數者熱絃遲者寒代散者折洩㵼下痢沉小滑弱實大浮洪發熱則惡嘔吐反胃浮滑者昌絃數緊濇結腸者亡霍亂之候脉代勿訝厥逆遲微是則可怕欬嗽多浮聚肺闗胃沉緊小危浮濡易治喘急息肩浮滑者順沉濇肢寒散脉逆證病熱有火洪數可醫沉微無火無根者危骨蒸發熱脉數而虚熱而濇小必殞其軀勞極諸虚浮耎微弱土敗雙絃火炎急數諸病失血脉必見芤緩小可喜數大可憂瘀血内畜却宜牢大沉小濇微反成其害遺精白濁微濇而弱火盛隂虚芤濡洪數三消之脉浮大者生細小微濇形脱可驚小便淋閟鼻頭色黄濇小無血數大何妨大便燥結須分氣血陽數而實隂遲而濇癲乃重隂狂乃重陽浮洪吉兆沉急㓙殃癎脉宜虚實急者惡浮陽沉隂滑痰數熱喉痺之脉數熱遲寒纒喉走馬微伏則難諸風眩運有火有痰左濇死血右大虚㸔頭痛多絃浮風緊寒熱洪濕細緩滑厥痰氣虚絃耎血虚微濇腎厥絃堅真痛短濇心腹之痛其類有九細遲從吉浮大延乆疝氣絃急積聚在裏牢急者生弱積者死腰痛之脉多沉而絃兼浮者風兼緊者寒絃滑痰飲濡細腎著大乃腎虚沉實閃肭脚氣有四遲寒數熱浮滑者風濡細者濕痿病肺虚脉多微緩或濇或緊或細或濡風寒濕氣合而為痺浮濇而緊三脉乃備五疽實熱脉必洪數濇微屬虚切忌發渴脉得諸沉責其有水浮氣與風沉石或裏沉數為陽沉遲為隂浮大出厄虚小可驚脹滿脉絃土制于木濕熱數洪隂寒遲弱浮為虚滿緊則中實浮大可治虚小危極五臟為積六腑為聚實强者生沉細者死中惡腹脹緊細者生脉若浮大邪氣已深癰疽浮數惡寒發熱若有痛處癰疽所發脉數發熱而痛者傷不數不熱不疼隂瘡未潰癰疽不怕洪大已潰癰疽洪大可怕肺癰已成寸數而實肺痿之形數而無力肺癰色白脉冝短濇不宜浮大唾糊嘔血腸癰實熱滑數可知數而不熱闗脉芤虚微濇而緊未膿當下緊數膿成切不可下婦人之脉以血為本血旺易胎氣旺難孕少隂動甚謂之有子尺脉滑利妊娠可喜滑疾不散胎必三月但疾不散五月可别左疾為男右疾為女女腹如箕男腹如斧欲産之脉其至離經水下乃産未下勿驚新産之脉緩滑為吉實大絃牢有證則逆小兒之脉七至為平更察色證與虎口文竒經八脉其診又别直上直下浮則為督牢則為衝緊則任脉寸左右彈陽蹻可决尺左右彈隂蹻可别闗左右彈帶脉當訣尺外斜上至寸隂維尺内斜上至寸陽維督脉為病脊强癲癎任脉為病七疝瘕堅衝脉為病逆氣裏急帶主帶下臍痛精失陽維寒熱目眩僵仆隂維心痛胸脇刺築陽蹻為病陽緩隂急隂蹻為病隂緩陽急癲癎瘛瘲寒熱恍惚八脉脉證各有所屬平人無脉移于外絡兄位弟乘陽蹊列缺病脉既明吉㓙當别經脉之外又有真脉肝絶之脉循刀責責心絶之脉轉豆躁疾脾則雀啄如屋之漏如水之流如盃之覆肺絶如毛無根蕭索麻子動揺浮波之合腎脉将絶至如省客來如彈石去如解索命脉将絶鰕㳺魚翔至如涌泉絶在膀胱真脉既形胃已無氣叅察色證㫁之以臆附脉訣攷證脉訣非叔和書晦庵朱子曰古人察脉非一道今世惟守寸闗尺之法所謂闗者多不明獨俗傳脉訣詞最鄙淺非叔和本書乃能直指髙骨為闗然世之高醫以其書贋遂委棄而羞言之䟦郭長陽書東陽栁貫曰王叔和撰脉經十卷為醫家一經今脉訣熟在人口直謂叔和所作不知叔和西晋時尚未有歌括此乃宋之中世人偽托以便習肄爾朱子取其高骨為闗之説不知其正出脉經也廬陵謝縉翁曰今稱叔和脉訣不知起于何時宋熙寕初校正脉經尚未有此陳孔碩始言脉訣出而脉經隠則脉訣乃熙寧以後人作耳惟陳無擇三因方言高陽生剽竊作歌訣劉元賔從而和之其説似深知脉經者而又自著七表八裏九道之名則陳氏亦未嘗詳讀脉經矣河東王世相曰診候之法不易精也軒岐微藴越人叔和撰難經脉經猶未盡泄其奥五代高陽生著脉訣假叔和之名語多牴牾辭語鄙俚又被俗學妄註世醫家傳户誦茫然無所下手不過藉此求食而已於診視何益哉雲間錢慱曰晉太醫令王叔和著脉經其言可守而不可變及托叔和脉訣行而醫經之理遂微盖叔和為世所信重故假其名而得行耳然醫道之日淺未必不由此而誤之也七表八裏九道之非金陵戴起宗曰脉不可以表裏定名也軒岐越人叔和皆不言表裏脉訣竊叔和之名而立七表八裏九道為世大惑脉之變化從隂陽生但可以隂陽對待而言各從其類豈可以一浮二芤為定序而分七八九之名乎大抵因浮而見者皆為表因沉而見者皆為裏何拘于七八九哉廬山劉立之以浮沉遲數為綱以教學者雖似㨗徑然必慱學反約然後能入脉妙若以此自足亦畫矣攖寧滑夀曰脉之隂陽表裏以對待而為名象也高陽生之七表八裏九道盖鑿鑿也求脉之明為脉之晦謝氏曰脉經論脉二十四種初無表裏九道之目其言芤脉云中央空兩邉實云芤則為隂而脉訣以芤為七表屬陽云中間有兩頭無仲景脉法云浮大數動滑為陽沉濇弱弦微為隂而脉訣以動為隂以弦為陽似此背誤頗多則脉訣非叔和書可推矣草廬呉澄曰俗誤以脉訣為脉經而王氏脉經知者或鮮脉書往往混牢革為一夫牢為寒實革為虚寒安可混乎脉之浮沉虚實緊緩數遲滑濇長短之相反匹配自不容易况有難辨如洪散俱大而洪有力微細俱小而微無力芤類浮而邉有中無伏類沉而邉無中有若豆粒而揺揺不定者動也若鼓皮而如如不動者革也俱對待也又有促結代皆有止之脉促疾結緩故可為對代則無對總之凡二十七脉不止于七表八裏九道二十四脉也詳文集瀕湖李時珍曰脉經論脉止有二十四種無長短二脉脉訣歌脉亦有二十四種増長短而去數散皆非也素難仲景論脉祗别隂陽初無定數如素問之鼔摶喘横仲景之惵平榮章綱損縱横逆順之類是也后世脉之精微失傳無所依凖因立名而為之歸著耳今之學者按圖索驥猶若望洋而况舉其全㫖乎此草廬公説猶得要領也男女脉位齊褚澄曰男子陽順自下生上故右尺為受命之根萬物從􅁟而出故右闗為脾生右寸肺肺生左尺腎腎生左闗肝肝生左寸心女子隂逆自上生下故左寸為受命之根萬物從􅁟而出故左闗為脾生左尺肺肺生右寸腎腎生右闗肝肝生右尺心詳褚氏遺書華谷儲泳曰脉訣以女人尺脉盛弱與男子相反為背㸔夫男女形體絶異隂陽殊塗男生而覆女生而仰男則左旋女則右轉男主施女主受男之至命在腎處臟腑之極下女之至命在乳處臟腑之極上形氣既異脉行于形氣之間豈畧不少異耶此褚氏之説為有理也詳祛疑説戴起宗曰脉訣因男子左腎右命女子左命右腎之别遂言反此背㸔而諸家以尺脉盛弱解之褚氏又以女人心肺診于尺倒裝五臟其謬又甚不知男女形氣精血雖異而十二經脉所行始終五臟之定位則一也安可以女人脉位為反耶丹溪朱震亨曰昔軒轅使伶倫截嶰谷之竹作黄鍾律管以候天地之節氣使岐伯取氣口作脉法以候人之動氣故黄鍾之數九分氣口之數亦九分律管具而寸之數始形故脉之動也陽得九分隂得一寸吻合于黄鍾天不足西北陽南而隂北故男子寸盛而尺弱肖乎天也地不滿東南陽北而隂南故女子尺盛而寸弱肖乎地也黄鍾者氣之先兆故能測天地之節候氣口者脉之要㑹故能知人命之死生世之俗醫誦高陽生之妄作欲以治病其不殺人也幾希龍丘葉氏曰脉者天地之元性故男女尺寸盛弱肖乎天地越人以為男生于寅女生于申三陽從天生三隂從地長謬之甚也獨丹溪惟本律法混合天人而闢之使千載之誤一旦昭然豈不韙哉臟腑部位紹興王宗正曰診脉之法當從心肺俱浮肝腎俱沉脾在中州之説王叔和獨守寸闗尺分部位以測五臟六腑之脉者非也慈溪趙繼宗曰脉訣言左心小腸肝膽腎右肺大腸脾胃命者非也心肺居上為陽為浮肝腎居下為隂為沉脾居中州半隂半陽半浮半沉當以左寸為心右寸為肺左尺為肝右尺為腎兩闗為脾闗者隂陽之界限前取陽三分後取隂三分所謂土居金木水火之中寄王于四時不獨右闗為脾也肝既為隂豈宜在半隂半陽半浮半沉之左闗耶命門即是腎不宜以右尺為診詳儒醫精要呉草廬曰醫者于寸闗尺輙名之曰此心脉此肺脉此肝脉此脾脉此腎脉者非也五臟六腑凡十二經兩手寸闗尺者手太隂肺經之一脉也分其部位以候他臓之氣耳脉行始于肺終于肝而復㑹于肺肺為氣所出之門户故名曰氣口而為脉之大會以占一身焉詳文集李時珍曰兩手六部皆肺之經脉也特取此以候五臓六腑之氣耳非五臟六腑所居之處也凡診察皆以肺心脾肝腎各候一動五十動不止者五臟皆足内有一止則知一臟之脉不至據此推之則以肺經一脉候五臟六腑之氣者可心解矣褚儲趙氏不知脉隨五臟之氣行于經隧之間欲以男女臟腑顛倒部位執泥不通戴同父言褚氏倒装五臟丹溪别男女尺寸草廬明三部皆肺三説皆有真見學者所當宗師若夫趙氏所云盖本于宋人王宗正難經圖解豈知脉分兩手出于素問脉要精微論而越人推明闗脉及一脉十變于難經非始于叔和也若如其説則一脉十變何從推之可謂鑿而狂矣命門即腎之説乃越人之誤也予嘗著命門攷命門三焦客難二説凡二千餘言云瀕湖脉學
