body:
  text: 瀕湖脈學醫家類提要臣等謹案瀕湖脈學一卷明李時珍撰宋人剽竊王叔和脈經改為脈訣其書之鄙謬人人知之然未能一一駁正也至元戴啓宗作刋誤字剖句析與之辨難而後其偽妄始明啓宗書之精核亦人人知之然但斥􅎓本之非尚未能詳立一法明其何以是也時珍乃撮舉其父言聞四診發明著為此書以正脈訣之失其法分浮沉遲數滑澀虛實長短洪微緊緩芤弦革牢濡弱散細伏動促結代二十七種毫釐之别精核無遺又附載宋崔嘉彥四言詩一首及諸家考證脈訣之説以互相發明與所作竒經八脈考皆附本草綱目之後可謂既能博考又能精研者矣自是以來脈訣遂廢其廓清醫學之功亦不在戴啓宗下也乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書瀕湖脈學明李時珍撰時珍曰宋有俗子杜撰脈訣鄙陋紕繆醫學習誦以為權輿逮臻頒白脈理竟昧戴同父常刋其誤先考月池翁著四診發明八卷皆精詣奧室淺學未能窺造珍因撮粹擷華僣撰此書以便習讀為脈指南世之醫病兩家咸以脈為首務不知脈乃四診之末謂之巧者爾上士欲會其全非備四診不可明嘉靖甲子上元日謹書于瀕湖薖所浮陽浮脈舉之有餘按之不足脈經如微風吹鳥背上毛厭厭聶聶輕泛貌如循榆莢素問如水漂木崔氏如捻蔥葉黎氏浮脈法天有輕清在上之象在卦為乾在時為秋在人為肺又謂之毛太過則中堅旁虛如循雞羽病在外也不及則氣來毛微病在中也浮脈訣言尋之如太過乃浮兼洪緊之象非脈也體狀詩浮脈惟從肉上行如循榆莢似毛輕三秋得令知無恙久病逢之卻可驚相類詩浮如木在水中浮浮大中空乃是芤拍拍而浮是洪脈來時雖盛去悠悠浮脈輕平似捻蔥虛來遲大豁然空浮而柔細方為濡散似楊花無定蹤浮而有力為洪浮而無力為芤浮而遲大為虛浮而柔細為濡虛甚為散主病詩浮脈為陽表病居遲風數熱緊寒拘浮而有力多風熱無力而浮是血虛寸浮頭痛眩生風或有風痰聚在胸關上土衰兼木旺尺中溲便不流通浮脈主表浮散風熱有力表實浮緊風寒無力表虛浮緩風濕浮遲中風浮虛傷暑浮芤失血浮散勞極浮洪虛熱沉隂沉脈重手按至筋骨乃得脈經如綿裹砂內剛外柔楊氏如石投水必極其底沉脈法地有淵泉在下之象在卦為坎在時為冬在人為腎又謂之石亦曰營太過則如彈石按之益堅病在外也不及則氣來虛微去如數者病在中也各脈訣言緩度三關狀如爛綿者非也沉有緩數及部之沉爛綿乃弱脈非沉也體狀詩水行潤下脈來沉筋骨之間耎滑勻女子寸兮男子尺四時如此號為平相類詩沉幫筋骨自調勻伏則推筋著骨尋沉細如綿真弱脈絃長實大是牢形沉行筋間牢大有力伏行骨上弱細無力主病詩沉潛水畜隂經病數熱遲寒滑有痰無力而沉虛與氣沉而有力積并寒寸沉痰鬱水停胸關主中寒痛不通尺部濁遺并泄痢腎虛腰及下元痌沉脈主裏又主水畜有力裏實沉遲痼冷無力裏虛沉數內熱沉則為氣沉滑痰食沉澀氣鬱沉緊冷痛沉弱寒熱沉牢冷積沉緩寒濕遲隂遲脈一息三至去來極慢脈經遲為陽不勝隂故脈來不及見脈訣言重手乃得是有沉無浮一息三至甚為易而曰隱隱曰狀且難是澀脈矣其謬可知體狀詩遲來一息至惟三陽不勝隂氣血寒但把浮沉分表裏消隂須益火之原相類詩脈來三至號為遲小駃于遲作緩持遲細而難知是澀浮而遲大以虛推三至為遲有有力為緩遲無力為澀止為絃甚為敗慢浮大而耎為虛緩黎氏曰遲小而實緩大而遲為隂盛陽衰為衛盛營弱宜别之主病詩遲司臟病或多痰沉痼癥瘕子細看有力而遲為冷痛遲而無力定虛寒寸遲必是上焦寒關主中寒痛不堪尺是腎虛腰腳重溲便不禁疝牽丸遲脈主臟浮遲表寒有力冷痛沉遲裏寒無力虛寒數陽數脈一息六至脈經脈流薄疾素問數為隂不勝陽故脈來太過七浮沉遲數脈之綱領素問脈經皆為正脈脈訣立表八裏而遺數脈止歌于心臟其妄甚矣體狀詩數脈息間常六至隂微陽盛必狂煩浮沉表裏分虛實惟有兒童作吉看相類詩數比平人多一至緊來如數似彈繩數而時止名為促數見關中動脈形數而弦急為緊數而有止為促流利為滑數甚為極數見關中為動主病詩數脈為陽熱可知只將君相火來醫實宜涼瀉虛溫補肺病秋深却畏之寸數咽喉口舌瘡吐紅咳嗽肺生瘍當關胃火并肝火尺屬滋隂降火湯數脈主腑沉數裏熱有力實火肺無力虛火肺浮數表熱氣口數實癰數虛痿滑陽中隂滑脈往來前郤流利展轉替替然如珠之應指脈經漉漉如欲脫滑為隂氣有餘故脈來流利如水脈者血之府也血盛則脈滑故腎脈宜之氣盛則脈澀故肺脈宜之不脈訣云按之即伏三關如珠不進不退是分浮滑沉滑尺寸之滑也今正之體狀相類詩滑脈如珠替替然往來流利郤還前莫將滑數為同類數脈惟看至數間滑則如珠數則六至主病詩滑脈為陽元氣衰痰生百病食生災上為吐逆下畜血女脈調時定有胎寸滑膈痰生嘔吐吞酸舌強或咳嗽當關宿食肝脾熱渴痢􅒃淋看尺部滑主痰飲滑短宿食浮滑風痰滑沉滑食痰臍滑數痰火經脈訣言關胃寒尺滑似水與脈言關滑胃熱尺滑血畜婦人經病之旨相反其謬如此澀隂澀脈細而遲往來難短且散或一止復來脈經參伍不調素問如輕刀刮竹脈訣如雨沾沙通真子如病蠶食葉澀為陽氣有餘氣盛則血少故脈來蹇滯而肺宜之脈訣言指下尋之似有舉之全無與脈經所云絶不相干體狀詩細遲短澀往來難散止依稀應指間如雨沾沙容易散病蠶食葉慢而艱相類詩參伍不調名曰澀輕刀刮竹短而難微似秒芒微耎甚浮沉不别有無間細遲短散時一止曰澀濡極細而耎重按若絶曰微浮而柔細曰沉而柔細曰弱主病詩澀緣血少或傷精反胃亡陽汗雨淋寒濕入營為血痺女人非孕即無經寸澀心虛痛對胸胃虛脅脹察關中尺為精血俱傷候腸結溲淋或下紅澀主血少精傷之病女人有孕為胎病無孕為敗血杜光庭云澀脈獨見尺中形同代為死脈虛隂虛脈遲大而耎按之無力隱指豁豁然空脈經崔紫虛云形大力薄其虛可知楊脈訣言尋之不足舉之有餘止言浮脈不見虛狀仁齋言狀似栁絮散漫而遲滑氏言散大而耎皆是散脈非虛也體狀相類詩舉之遲大按之鬆脈狀無涯類谷空莫把芤虛為一例芤來浮大似慈蔥虛脈浮大而遲按之無力浮芤脈浮大按之中空芤為無血虛為血虛散二脈見浮脈主病詩脈虛身熱為傷暑自汗怔忡驚悸多發熱隂虛須早治養營益氣莫蹉跎血不榮心寸口虛關中腹脹食難舒骨蒸痿痺傷精血郤在神門兩部居經曰血虛脈虛曰氣來虛微為不及病在內日久病脈虛者死實陽實脈浮沉皆得脈大而長微弦應指愊愊然脈經愊愊堅實貌脈脈訣言如繩應指來乃緊非實脈也體狀詩浮沉皆得大而長應指無虛愊愊強熱藴三焦成壯火通腸發汗始安康相類詩實脈浮沉有力強緊如彈索轉無常須知牢脈幫筋骨實大微弦更帶長浮沉有力為實而絃急彈人為緊沉而實大微絃長為牢主病詩實脈為陽火鬱成發狂譫語吐頻頻或為陽毒或傷食大便不通或氣疼寸實應知靣熱風咽疼舌強氣填胸當關脾熱中宮滿尺實腰腸痛不通經曰血實脈實曰脈實者水榖為病曰氣來實強是謂太過脈訣言尺實小便不禁與脈經尺實小腹痛小便難之説何反潔古不知其謬訣為虛寒藥用薑附愈誤矣長陽長脈不大不小迢迢自若朱氏如循長竿末梢為平如引繩如循長竿為病素問長有三部之長一部之長在時為春在人為肝心脈長神強氣壯腎脈長蒂固根深經曰長則氣治皆言平脈也體狀相類詩過于本位脈名長絃則非然但滿張絃脈與長爭較逺良工反度自能量實牢絃緊皆兼長脈主病詩長脈迢迢大小勻反常為病似牽繩若非陽毒癲癎病即是陽明熱勢深長主有餘之病短隂短脈不及本位脈訣應指而回不能滿部脈經戴同父云短脈只見尺寸若關中見短上不通寸下不通尺是隂陽絶脈必死矣故關不診短黎居士云長短未有定體諸脈舉按之時過於本位者為長不及本位者為短長脈屬肝宜于春短脈屬肺宜于秋但診肝肺長短自見體狀相類詩兩頭縮縮名為短澀短遲遲細且難短澀而浮秋喜見三春為賊有邪干澀微動結皆兼短脈主病詩短脈惟于尺寸尋短而滑數酒傷神浮為血澀沉為痞寸主頭疼尺腹疼經曰短則氣病短主不及之病洪陽洪脈指下極大脈經來盛去衰素問來大去長通真子洪脈在卦為離在時為夏在人為心素問謂之大亦曰鉤滑氏曰來盛去衰如鉤之曲上而復下應血脈來去之象象萬物敷布下垂之狀季詹炎舉言如環珠者非脈訣云季夏宜之秋季冬發汗通腸俱非洪脈所宜蓋謬也體狀詩脈來洪盛去還衰滿指滔滔應夏時若在春秋冬月分升陽散火莫狐疑相類詩洪脈來時拍拍然去衰來盛似波瀾欲知實脈參差處舉按絃長愊愊堅洪而有力為實實而無力為洪主病詩脈洪陽盛血應虛相火炎炎熱病居脹滿胃翻須早治隂虛泄痢可愁如寸洪心火上焦炎肺脈洪時金不堪肝火胃虛關內察腎虛隂火尺中看洪主陽盛隂虛之病泄痢失血久嗽者忌之經曰形瘦脈大多氣者死日脈大則病進微隂微脈極細而耎按之如欲絶若有若無脈經細而稍長戴氏血素問謂之小氣微則脈微體狀相類詩微脈輕微瞥瞥乎按之欲絶有如無微為陽弱細隂弱細比于微略較粗輕診即見重按如欲絶者微也上往來如綿而常有者細也仲景曰脈瞥瞥如羮肥者陽氣微縈縈如蠶絲細者隂氣衰長病得之死卒病得之生主病詩氣血微兮脈亦微惡寒發熱汗淋漓男為勞極諸虛候女作崩中帶下醫寸微氣促或心驚關脈微時脹滿形尺部見之精血弱惡寒消疸痛呻吟微主久虛血弱之病陽微惡寒隂微發熱脈訣云崩中日久為白帶漏下多時骨肉枯緊陽緊脈來往有力左右彈人手素問如轉索無常仲景數如切繩脈經如紉箄線丹溪緊乃熱為寒束之脈故急數如此要有神氣素問謂之急脈訣言寥寥入尺來崔氏言如線皆非緊狀或以浮緊為弦沉緊為牢亦近似耳體狀詩舉如轉索切如繩脈象因之得緊名總是寒邪來作冦內為腹痛外身疼相類詩見絃實主病詩緊為諸痛主于寒喘咳風癎吐冷痰浮緊表寒須發越緊沉溫散自然安寸緊人迎氣口分當關心腹痛沉沉尺中有緊為隂冷定是奔豚與疝疼諸緊為寒為痛人迎緊盛傷于寒氣口緊盛傷于食尺緊痛居其腹沉乃疾在其腹中惡浮緊咳嗽沉緊皆主死緩隂緩脈去來小駛于遲脈經一息四至戴氏如絲在經不卷其軸應指和緩往來甚勻張太素如初春楊栁舞風之象楊玄操如微風輕颭栁梢滑伯仁緩脈在卦為坤在時為四季在人為脾陽寸隂尺上下同等浮大而耎無有遍勝者平脈也若非其時即為有病緩而和勻不浮不沉不疾不徐不微不弱者即為胃氣故杜光庭云欲知死期何以取古賢推定五般土陽土須知不遇隂隂土遇隂當細數詳玉函經體狀詩緩脈阿阿四至通栁梢裊裊颭輕風欲從脈裏求神氣只在從容和緩中相類詩見遲脈主病詩緩脈營衰衛有餘或風或濕或脾虛上為項強下痿痺分别浮沉大小區寸緩風邪項背拘關為風眩胃家虛神門濡泄或風祕或是蹣跚足力迂浮緩為風緩澀脾虛沉緩為濕緩弱氣虛緩大風虛主緩細濕痺反脈訣言緩脾熱口臭胃齒痛夢鬼之病出自杜撰與緩無關芤陽中隂芤脈浮大而耎按之中央空兩邉實脈經中空外實狀如慈蔥芤慈蔥也素問無芤名劉三點云芤脈何似絶類慈蔥指下成窟有邉無中戴同父云營行脈中脈以血為形芤脈中空脫血之象也訣脈經云三部脈芤長病得之生卒病得之死脈言兩頭有中間無是脈斷截矣又言主淋瀝氣入小腸與失血之候相反誤世不小體狀詩芤形浮大耎如蔥按之旁有中央空火犯陽經血上溢熱侵隂絡下流紅相類詩中空旁實乃為芤浮大而遲虛脈呼芤更帶絃名曰革血亡芤革血虛虛主病詩寸芤積血在于胸關內逄芤腸胃癰尺部見之多下血赤淋紅痢漏崩中絃陽中隂絃脈端直以長素問如張弓絃脈經按之不移綽綽如按琴瑟絃巢氏狀若筝絃脈訣從中直過挺然指下刋誤絃脈在卦為震在時為春在人為肝輕虛以滑者平實滑如循長竿者病徑急如新張弓絃者死池氏曰絃緊而數徑為太過絃緊而細為不及戴同父曰絃而耎其病輕絃而硬其病重脈訣言時時帶數又言脈緊狀繩牽皆非絃象今削之體狀詩絃脈迢迢端直長肝經木王土應傷怒氣滿胸常欲呌翳蒙瞳子淚淋浪相類詩絃來端直似絲絃緊則如繩左右彈緊言其力絃言象牢脈絃長沉伏間又見長脈主病詩絃應東方肝膽經飲痰寒熱瘧纒身浮沉遲數須分别大小單雙有重輕寸絃頭痛膈多痰寒熱癥瘕察左關關右胃寒心腹痛尺中隂疝腳拘攣絃為木盛之病浮絃支飲外溢多沉絃懸飲內痛瘧脈自絃絃數多熱絃遲寒絃大主虛絃細拘急若陽絃頭痛來隂絃腹痛治單絃飲癖雙絃寒痼不食者木克土必難革隂革脈絃而芤仲景如按鼓皮丹溪仲景曰絃則為寒芤則為虛虛寒相博此名曰革男子亡血失精婦人半産漏下脈經曰三部脈革長病得之死卒病得之生時珍曰此即芤絃二脈相合故均主失血之候諸家脈書皆以為牢脈故或有革無牢有牢無革混淆不辨不知革浮牢沉革虛牢實形證皆異也又按甲乙經曰渾渾革革至如涌泉病進而危弊弊綽綽其去如絃絶者死謂脈來渾濁革變急如涌泉出而不反也王貺以為溢脈與此不同體狀主病詩革脈形如按鼓皮芤絃相合脈寒虛女人半産并崩漏男子營虛或夢遺相類詩見芤牢牢隂中陽牢脈似沉似伏實大而長微絃脈經扁鵲曰牢而長者肝也仲景曰寒則牢堅有牢固之象沈氏曰似沉似伏牢之位也實大絃長牢之體也脈訣不言形狀但云尋之則無按之則有云脈入皮膚辨息難又以牢為死脈皆孟浪謬誤體狀相類詩絃長實大脈牢堅牢位常居沉伏間革脈芤絃自浮起革虛牢實要詳看主病詩寒則牢堅裏有餘腹心寒痛木乘脾疝􅒃癥瘕何愁也失血隂虛郤忌之牢主寒實之病木實則為痛扁鵲云耎為虛牢為實失血者脈冝沉細反浮大而牢者死虛病見實脈也脈訣言骨間疼痛氣居于表池氏以為腎傳于脾皆謬妄不經濡隂即耎字濡脈極耎而浮細如帛在水中輕手相得按之無有脈經如水上浮漚帛浮水中重手按之隨手而沒之象也脈訣言按之似有舉還無是微脈非濡體狀詩濡形浮細按須輕水靣浮綿力不禁病後産中猶有藥平人若見是無根相類詩浮而柔細知為濡沈細而柔作弱持微則浮微如欲絶細來沉細近于微浮細如綿曰濡極細如絶曰微沉細如綿曰弱曰浮而沉而極細不斷細主病詩濡為亡血隂虛病髓海丹田暗已虧汗雨夜來蒸入骨血山崩倒濕侵脾寸濡陽微自汗多關中其奈氣虛何尺傷精血虛寒甚溫補真隂可起疴濡主血虛之病又為傷濕弱隂弱脈極耎而沉細按之乃得舉手無有脈經弱乃濡之沉者脈訣言輕手乃得黎氏譬如浮漚皆是濡脈非弱也素問曰脈弱以滑是有胃氣脈弱以澀是謂久病病後老弱見之順平人少年見之逆體狀詩弱來無力按之柔柔細而沉不見浮陽陷人隂精血弱白頭猶可少年愁相類詩見濡脈主病詩弱脈隂虛陽氣衰惡寒發熱骨筋萎多驚多汗精神減益氣調營急早醫寸弱陽虛病可知關為胃弱與脾衰欲求陽陷隂虛病須把神門兩部推弱主氣虛之病仲景曰陽陷入隂故惡寒發熱又云弱主筋沉主骨陽浮隂弱血虛筋急栁氏曰氣虛則脈弱寸弱陽虛尺弱隂虛關弱胃虛散隂散脈大而散有表無裏脈經渙漫不收崔氏無統紀無拘束至數不齊或來多去少或去多來少渙散不收如楊花散漫之象栁氏戴同父曰心脈浮大而散肺脈短澀而散平脈也心脈耎散怔忡肺脈耎散汗出肝脈耎散溢飲脾脈耎散胻腫病脈也腎脈耎散諸病脈代散死脈也難經曰散脈獨見則危栁氏曰散為氣血俱虛根本脫離之脈産婦得之生孕婦得之墮體狀詩散似楊花散漫飛去來無定至難齊産為生兆胎為墮久病逢之不必醫相類詩散脈無拘散漫然濡來浮細水中綿浮而遲大為虛脈芤脈中空有兩邉主病詩左寸怔忡右寸汗溢飲左關應耎散右關耎散胻腫胕散居兩尺魂應斷細隂細脈小于微而常有細直而耎若絲線之應指脈經素問謂之小王啓言如莠蓬狀其柔細也背脈訣言往來極微是微反大于細矣與經相體狀詩細來纍纍細如絲應指沉沉無絶期春夏少年俱不利秋冬老弱郤相宜相類詩見微濡主病詩細脈縈縈血氣衰諸虛勞損七情乖若非濕氣侵腰腎即是傷精汗泄來寸細應知嘔吐頻入關腹脹胃虛形尺逢定是丹田冷泄痢遺精號脫隂脈經曰細為血少氣衰有此證則順否則逆故吐衄得沉細者生憂勞過度者脈亦細伏隂伏脈重按著骨指下裁動脈經脈行筋下刋誤脈訣言尋之似有定息全無殊為舛謬體狀詩伏脈推筋著骨尋指間裁動隱然深傷寒欲汗陽將解厥逆臍疼證屬隂相類詩見沉脈主病詩伏為霍亂吐頻頻腹痛多緣宿食停畜飲老痰成積聚散寒溫裏莫因循食鬱胸中雙寸伏欲吐不吐常兀兀當關腹痛困沉沉關後疝疼還破腹傷寒一手脈伏曰單伏兩手脈伏曰雙伏不可以陽證見隂為診乃火邪內鬱不得發越陽極似隂故脈伏必有大汗而解正如久旱將雨六合隂晦雨後庶物皆蘇之義又有夾隂傷寒先有伏隂在內外復感寒隂盛陽衰四脈厥逆六脈沉伏須投薑附及炙關元脈乃復出也若太溪衝陽皆無脈者必死脈訣言徐徐發汗潔古以附子細辛麻黃湯主之皆非也劉元賔曰伏脈不可發汗動陽動乃數脈見于關上下無頭尾如豆大厥厥動搖仲景曰隂陽相搏名曰動陽動則汗出隂動則發熱形冷惡寒此三焦傷也成無巳曰隂陽相搏則虛者動故陽虛則陽動隂虛則隂動龎安常曰關前三分為陽後三分為隂關位半隂半陽故動隨虛見脈訣言尋之似有舉之還無不離其處不往不來三關沉沉含糊謬妄殊非動脈詹氏言其形鼓動如鉤如毛者尤謬體狀詩動脈搖搖數在關無頭無尾豆形團其原本是隂陽搏虛者搖兮勝者安主病詩動脈專司痛與驚汗因陽動熱因隂或為泄痢拘攣病男子亡精女子崩仲景曰動則為痛為驚素問曰隂虛陽搏謂之崩又曰婦人手少隂脈動甚者妊子也促陽促脈來去數時一止復來脈經如蹶之趣徐疾不常黎氏脈經但言數而止為促脈訣乃云并居寸口不言時止者謬矣數止為促緩止為結何獨寸口哉體狀詩促脈數而時一止此為陽極欲亡隂三焦鬱火炎炎盛進必無生退可生相類詩見代脈主病詩促脈惟將火病醫其因有五細推之時時喘咳皆痰積或發狂斑與毒疽促主陽盛之病一促結之因皆有氣血痰飲食五者之别有留滯則脈必見止也結隂結脈往來緩時一止復來脈經脈訣言或來或去聚而却還與結無關仲景有纍纍如循長竿曰隂結藹藹如車蓋曰陽結脈經又有如麻子動搖旋引旋收聚散不常者曰結主死此三脈名同實異也體狀詩結脈緩而時一止獨隂偏盛欲亡陽浮為氣滯沉為積汗下分明在主張相類詩見代脈主病詩結脈皆因氣血凝老痰結滯苦沉吟內生積聚外癰腫疝瘕假為殃病屬隂結主隂盛之病越人曰結甚則積甚結微則氣微浮結外有痛積伏結內有積聚代隂代脈動而中止不能自還因而復動仲景脈至還入尺良久方來吳氏脈一息五至肺心脾肝腎五臟之氣皆足五十動而一息合大衍之數謂之平脈反此則止乃見焉腎氣不能至則四十動一止肝氣不能至則三十動一止蓋一臟之氣衰而他臟之氣代至也經曰代則氣衰滑伯仁曰若無病羸瘦脈代者危脈也有病而氣血乍損氣不能續者祗為病脈傷寒心悸脈代者復脈湯主之妊娠脈代者其胎百日代之生死不可不辨體狀詩動而中止不能還復動因而作代看病者得之猶可療平人郤與夀相關相類詩數而時止名為促緩止須將結脈呼止不能回方是代結生代死自殊塗促結之止無常數或二動三動一止即來代脈之止有常數必依數而止還入尺中良久方來也主病詩代脈元因臟氣衰腹疼泄痢下元虧或為吐㵼中宫病女子懷胎三月兮脈經曰代散者死生泄及便膿血五十不止身無病數內有止皆知定四十一止一臟絶四年之後多亡命三十一止即三年二十一止二年應十動一止一年殂更觀氣色兼形證兩動一止三四日三四動止應六七五六一止七八朝次第推之自無失戴同父曰脈必滿五十動出自難經而脈訣五臟歌皆以四十五動為凖乖于經旨栁東楊曰古以動數候脈是喫緊語須候五十動乃知五臟缺失今人指到腕臂即云見了夫五十動豈彈指間事耶故學者當診脈問證聼聲觀色斯備四診而無失四言舉要宋南康紫虛隱君崔嘉彥希範著明蘄州月池子李言聞子郁刪補脈乃血派氣血之先血之隧道氣息應焉其象法地血之府也心之合也皮之部也資始于腎資生于胃陽中之隂本乎營衛營者隂血衛者陽氣營行脈中衛行脈外脈不自行隨氣而至氣動脈應隂陽之誼氣如槖籥血如波瀾血脈氣息上下循環十二經中皆有動脈惟手太隂寸口取決此經屬肺上系吭嗌脈之大會息之出入一呼一吸四至為息日夜一萬三千五百一呼一吸脈行六寸日夜八百十丈為凖初持脈時令仰其掌掌後高骨是謂關上關前為陽關後為隂陽寸隂尺先後推尋心肝居左肺脾居右腎與命門居兩尺部魂魄榖神皆見寸口左主司官右主司府左大順男右大順女本缺扶命男左女右關前一分人命之主左為人迎右為氣口神門決斷兩在關後人無二脈病死不愈男女脈同惟尺則異陽弱隂盛反此病至脈有七診曰浮中沉上下左右消息求尋又有九候舉按輕重三部浮沉各候五動寸候胸上關候膈下尺候于臍下至跟踝左脈候左右脈候右病隨所在不病者否浮為心肺沉為腎肝脾胃中州浮沉之間心脈之浮浮大而散肺脈之浮浮澀而短肝脈之沉沉而絃長腎脈之沉沉實而濡脾胃屬土脈宜和緩命為相火左寸同斷春絃夏洪秋毛冬石四季和緩是謂平脈太過實強病生于外不及虛微病生于內春得秋脈死在金日五臟準此推之不失四時百病胃氣為本脈貴有神不可不審調停自氣呼吸定息四至五至平和之則三至為遲遲則為冷六至為數數即熱證轉遲轉冷轉數轉熱遲數既明浮沉當别浮沉遲數辨內外因外因于天內因于人天有隂陽風雨晦冥人喜怒憂思悲恐驚外因之浮則為表證沉裏遲隂數則陽盛內因之浮虛風所為沉氣遲冷數熱何疑浮數表熱沉數裏熱浮遲表虛沉遲冷結表裏隂陽風氣冷熱辨內外因脈證參别脈理浩繁總括于四既得提綱引申觸類浮脈法天輕手可得泛泛在上如水漂木有力洪大來盛去悠無力虛大遲而且柔虛甚則散渙漫不收有邉無中其名曰芤浮小為濡綿浮水面濡甚則微不任尋按沉脈法地近于筋骨深深在下沉極為伏有力為牢實大絃長牢甚則實愊愊而強無力為弱柔小如綿弱甚則細如蛛絲然遲脈屬隂一息三至小駃于遲緩不及四二損一敗病不可治兩息奪精脈已無氣浮大虛散或見芤革浮小濡微沉小細弱遲細為澀往來極難易散一止止而復還結則來緩止而復來代則來緩止不能回數脈屬陽六至一息七疾八極九至為脫浮大者洪沉大牢實往來流利是謂之滑有力為緊彈如轉索數見寸口有止為促數見關中動脈可候厥厥動搖狀如小豆長則氣治過于本位長而端直絃脈應指短則氣病不能滿部不見于關惟尺寸候一脈一形各有主病數脈相兼則見諸證浮脈主表裏必不足有力風熱無力血弱浮遲風虛浮數風熱浮緊風寒浮緩風濕浮虛傷暑浮芤失血浮洪虛火浮微勞極浮濡隂虛浮散虛劇浮絃痰食浮滑痰熱沉脈主裏主寒主積有力痰食無力氣鬱沉遲虛寒沉數熱伏沉緊冷痛沉緩水畜沉牢痼冷沉實熱極沉弱隂虛沉細痺濕沉絃飲痛沉滑宿食沉伏吐利隂毒聚積遲脈主臟陽氣伏潛有力為痛無力虛寒數脈主腑主吐主狂有力為熱無力為瘡滑脈主痰或傷于食下為畜血上為吐逆澀脈少血或中寒濕反胃結腸自汗厥逆絃脈主飲病屬膽肝絃數多熱絃遲多寒浮絃支飲沉絃懸痛陽絃頭痛隂絃腹痛緊脈主寒又主諸痛浮緊表寒沉緊裏痛長脈氣平短脈氣病細則氣少大則病進浮長風癎沉短宿食血虛脈虛氣實脈實洪脈為熱其隂則虛細脈為濕其血則虛緩大者風緩細者濕緩澀血少緩滑內熱濡小隂虛弱小陽竭陽竭惡寒隂虛發熱陽微惡寒隂微發熱男微虛損女微瀉血陽動汗出隂動發熱為痛與驚崩中失血虛寒相搏其名為革男子失精女子失血陽盛則促肺癰陽毒隂盛則結疝瘕積鬱代則氣衰或泄膿血傷寒心悸女胎三月脈之主病有宜不宜隂陽順逆凶吉可推中風浮緩急實則忌浮滑中痰沉遲中氣尸厥沉滑卒不知人入臟身冷入腑身溫風傷于衛浮緩有汗寒傷于營浮緊無汗暑傷于氣脈虛身熱濕傷于血脈緩細澀傷寒熱病脈喜浮洪沉微澀小證反必凶汗後脈靜身涼則安汗後脈躁熱甚必難陽病見隂病必危殆隂病見陽雖困無害上不至關隂氣已絶下不至關陽氣已竭代脈止歇臟絶傾危散脈無根形損難醫飲食內傷氣口急滑勞倦內傷脾脈大弱欲知是氣下手脈沉沉極則伏澀弱久深大鬱多沉滑痰緊食氣澀血芤數火細濕滑主多痰絃主留飲熱則滑數寒則絃緊浮滑兼風沉滑兼氣食傷短疾濕留濡細瘧脈自絃絃數者熱絃遲者寒代散者折泄㵼下痢沉小滑弱實大浮洪發熱則惡嘔吐反胃浮滑者昌絃數緊澀結腸者亡霍亂之候脈代勿訝厥逆遲微是則可怕咳嗽多浮聚肺關胃沉緊小危浮濡易治喘急息肩浮滑者順沉澀肢寒散脈逆證病熱有火洪數可醫沉微無火無根者危骨蒸發熱脈數而虛熱而澀小必殞其軀勞極諸虛浮耎微弱土敗雙絃火炎急數諸病失血脈必見芤緩小可喜數大可憂瘀血內畜却宜牢大沉小澀微反成其害遺精白濁微澀而弱火盛隂虛芤濡洪數三消之脈浮大者生細小微澀形脫可驚小便淋閟鼻頭色黃澀小無血數大何妨大便燥結須分氣血陽數而實隂遲而澀癲乃重隂狂乃重陽浮洪吉兆沉急凶殃癎脈宜虛實急者惡浮陽沉隂滑痰數熱喉痺之脈數熱遲寒纒喉走馬微伏則難諸風眩運有火有痰左澀死血右大虛看頭痛多絃浮風緊寒熱洪濕細緩滑厥痰氣虛絃耎血虛微澀腎厥絃堅真痛短澀心腹之痛其類有九細遲從吉浮大延久疝氣絃急積聚在裏牢急者生弱積者死腰痛之脈多沉而絃兼浮者風兼緊者寒絃滑痰飲濡細腎著大乃腎虛沉實閃肭腳氣有四遲寒數熱浮滑者風濡細者濕痿病肺虛脈多微緩或澀或緊或細或濡風寒濕氣合而為痺浮澀而緊三脈乃備五疽實熱脈必洪數澀微屬虛切忌發渴脈得諸沉責其有水浮氣與風沉石或裏沉數為陽沉遲為隂浮大出厄虛小可驚脹滿脈絃土制于木濕熱數洪隂寒遲弱浮為虛滿緊則中實浮大可治虛小危極五臟為積六腑為聚實強者生沉細者死中惡腹脹緊細者生脈若浮大邪氣已深癰疽浮數惡寒發熱若有痛處癰疽所發脈數發熱而痛者傷不數不熱不疼隂瘡未潰癰疽不怕洪大已潰癰疽洪大可怕肺癰已成寸數而實肺痿之形數而無力肺癰色白脈冝短澀不宜浮大唾糊嘔血腸癰實熱滑數可知數而不熱關脈芤虛微澀而緊未膿當下緊數膿成切不可下婦人之脈以血為本血旺易胎氣旺難孕少隂動甚謂之有子尺脈滑利妊娠可喜滑疾不散胎必三月但疾不散五月可别左疾為男右疾為女女腹如箕男腹如斧欲産之脈其至離經水下乃産未下勿驚新産之脈緩滑為吉實大絃牢有證則逆小兒之脈七至為平更察色證與虎口文竒經八脈其診又别直上直下浮則為督牢則為衝緊則任脈寸左右彈陽蹻可決尺左右彈隂蹻可别關左右彈帶脈當訣尺外斜上至寸隂維尺內斜上至寸陽維督脈為病脊強癲癎任脈為病七疝瘕堅衝脈為病逆氣裏急帶主帶下臍痛精失陽維寒熱目眩僵仆隂維心痛胸脅刺築陽蹻為病陽緩隂急隂蹻為病隂緩陽急癲癎瘛瘲寒熱恍惚八脈脈證各有所屬平人無脈移于外絡兄位弟乘陽蹊列缺病脈既明吉凶當别經脈之外又有真脈肝絶之脈循刀責責心絶之脈轉豆躁疾脾則雀啄如屋之漏如水之流如杯之覆肺絶如毛無根蕭索麻子動搖浮波之合腎脈將絶至如省客來如彈石去如解索命脈將絶蝦遊魚翔至如涌泉絶在膀胱真脈既形胃已無氣參察色證斷之以臆附脈訣考證脈訣非叔和書晦庵朱子曰古人察脈非一道今世惟守寸關尺之法所謂關者多不明獨俗傳脈訣詞最鄙淺非叔和本書乃能直指髙骨為關然世之高醫以其書贋遂委棄而羞言之跋郭長陽書東陽栁貫曰王叔和撰脈經十卷為醫家一經今脈訣熟在人口直謂叔和所作不知叔和西晉時尚未有歌括此乃宋之中世人偽托以便習肄爾朱子取其高骨為關之説不知其正出脈經也廬陵謝縉翁曰今稱叔和脈訣不知起于何時宋熙寧初校正脈經尚未有此陳孔碩始言脈訣出而脈經隱則脈訣乃熙寧以後人作耳惟陳無擇三因方言高陽生剽竊作歌訣劉元賔從而和之其説似深知脈經者而又自著七表八裏九道之名則陳氏亦未嘗詳讀脈經矣河東王世相曰診候之法不易精也軒岐微藴越人叔和撰難經脈經猶未盡泄其奧五代高陽生著脈訣假叔和之名語多抵牾辭語鄙俚又被俗學妄注世醫家傳户誦茫然無所下手不過藉此求食而已於診視何益哉雲間錢慱曰晉太醫令王叔和著脈經其言可守而不可變及托叔和脈訣行而醫經之理遂微蓋叔和為世所信重故假其名而得行耳然醫道之日淺未必不由此而誤之也七表八裏九道之非金陵戴起宗曰脈不可以表裏定名也軒岐越人叔和皆不言表裏脈訣竊叔和之名而立七表八裏九道為世大惑脈之變化從隂陽生但可以隂陽對待而言各從其類豈可以一浮二芤為定序而分七八九之名乎大抵因浮而見者皆為表因沉而見者皆為裏何拘于七八九哉廬山劉立之以浮沉遲數為綱以教學者雖似捷徑然必慱學反約然後能入脈妙若以此自足亦畫矣攖寧滑夀曰脈之隂陽表裏以對待而為名象也高陽生之七表八裏九道蓋鑿鑿也求脈之明為脈之晦謝氏曰脈經論脈二十四種初無表裏九道之目其言芤脈云中央空兩邉實云芤則為隂而脈訣以芤為七表屬陽云中間有兩頭無仲景脈法云浮大數動滑為陽沉澀弱弦微為隂而脈訣以動為隂以弦為陽似此背誤頗多則脈訣非叔和書可推矣草廬吳澄曰俗誤以脈訣為脈經而王氏脈經知者或鮮脈書往往混牢革為一夫牢為寒實革為虛寒安可混乎脈之浮沉虛實緊緩數遲滑澀長短之相反匹配自不容易况有難辨如洪散俱大而洪有力微細俱小而微無力芤類浮而邉有中無伏類沉而邉無中有若豆粒而搖搖不定者動也若鼓皮而如如不動者革也俱對待也又有促結代皆有止之脈促疾結緩故可為對代則無對總之凡二十七脈不止于七表八裏九道二十四脈也詳文集瀕湖李時珍曰脈經論脈止有二十四種無長短二脈脈訣歌脈亦有二十四種增長短而去數散皆非也素難仲景論脈祗别隂陽初無定數如素問之鼓摶喘橫仲景之惵平榮章綱損縱橫逆順之類是也后世脈之精微失傳無所依凖因立名而為之歸著耳今之學者按圖索驥猶若望洋而况舉其全旨乎此草廬公説猶得要領也男女脈位齊褚澄曰男子陽順自下生上故右尺為受命之根萬物從土而出故右關為脾生右寸肺肺生左尺腎腎生左關肝肝生左寸心女子隂逆自上生下故左寸為受命之根萬物從土而出故左關為脾生左尺肺肺生右寸腎腎生右關肝肝生右尺心詳褚氏遺書華谷儲泳曰脈訣以女人尺脈盛弱與男子相反為背看夫男女形體絶異隂陽殊塗男生而覆女生而仰男則左旋女則右轉男主施女主受男之至命在腎處臟腑之極下女之至命在乳處臟腑之極上形氣既異脈行于形氣之間豈略不少異耶此褚氏之説為有理也詳祛疑説戴起宗曰脈訣因男子左腎右命女子左命右腎之别遂言反此背看而諸家以尺脈盛弱解之褚氏又以女人心肺診于尺倒裝五臟其謬又甚不知男女形氣精血雖異而十二經脈所行始終五臟之定位則一也安可以女人脈位為反耶丹溪朱震亨曰昔軒轅使伶倫截嶰谷之竹作黃鍾律管以候天地之節氣使岐伯取氣口作脈法以候人之動氣故黃鍾之數九分氣口之數亦九分律管具而寸之數始形故脈之動也陽得九分隂得一寸吻合于黃鍾天不足西北陽南而隂北故男子寸盛而尺弱肖乎天也地不滿東南陽北而隂南故女子尺盛而寸弱肖乎地也黃鍾者氣之先兆故能測天地之節候氣口者脈之要會故能知人命之死生世之俗醫誦高陽生之妄作欲以治病其不殺人也幾希龍丘葉氏曰脈者天地之元性故男女尺寸盛弱肖乎天地越人以為男生于寅女生于申三陽從天生三隂從地長謬之甚也獨丹溪惟本律法混合天人而闢之使千載之誤一旦昭然豈不韙哉臟腑部位紹興王宗正曰診脈之法當從心肺俱浮肝腎俱沉脾在中州之説王叔和獨守寸關尺分部位以測五臟六腑之脈者非也慈溪趙繼宗曰脈訣言左心小腸肝膽腎右肺大腸脾胃命者非也心肺居上為陽為浮肝腎居下為隂為沉脾居中州半隂半陽半浮半沉當以左寸為心右寸為肺左尺為肝右尺為腎兩關為脾關者隂陽之界限前取陽三分後取隂三分所謂土居金木水火之中寄王于四時不獨右關為脾也肝既為隂豈宜在半隂半陽半浮半沉之左關耶命門即是腎不宜以右尺為診詳儒醫精要吳草廬曰醫者于寸關尺輒名之曰此心脈此肺脈此肝脈此脾脈此腎脈者非也五臟六腑凡十二經兩手寸關尺者手太隂肺經之一脈也分其部位以候他臟之氣耳脈行始于肺終于肝而復會于肺肺為氣所出之門户故名曰氣口而為脈之大會以占一身焉詳文集李時珍曰兩手六部皆肺之經脈也特取此以候五臟六腑之氣耳非五臟六腑所居之處也凡診察皆以肺心脾肝腎各候一動五十動不止者五臟皆足內有一止則知一臟之脈不至據此推之則以肺經一脈候五臟六腑之氣者可心解矣褚儲趙氏不知脈隨五臟之氣行于經隧之間欲以男女臟腑顛倒部位執泥不通戴同父言褚氏倒裝五臟丹溪别男女尺寸草廬明三部皆肺三説皆有真見學者所當宗師若夫趙氏所云蓋本于宋人王宗正難經圖解豈知脈分兩手出于素問脈要精微論而越人推明關脈及一脈十變于難經非始于叔和也若如其説則一脈十變何從推之可謂鑿而狂矣命門即腎之説乃越人之誤也豫嘗著命門考命門三焦客難二説凡二千餘言云瀕湖脈學
